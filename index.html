<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APPLE 序號查詢</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 36px 32px 32px; width: 100%; max-width: 520px;
  }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
  #scanInput {
    width: 100%; padding: 13px 16px;
    border: 2px solid #d0d5dd; border-radius: 10px;
    font-size: 14px; color: #222; outline: none;
    transition: border-color 0.2s; background: #fafafa;
    margin-bottom: 12px;
  }
  #scanInput:focus { border-color: #4f46e5; background: #fff; }
  #scanInput::placeholder { color: #bbb; }

  /* Html5QrCode 會把 video 放這裡 */
  .qr-wrap {
    display: none;
    position: relative;
    width: 100%;
    margin-bottom: 16px;
    border-radius: 12px;
    overflow: hidden;
  }
  #qr-reader { width: 100%; }
  #qr-reader video { border-radius: 12px; }
  #qr-reader img, #qr-reader__dashboard, #qr-reader__status_span { display: none !important; }
  /* 十字對焦線 */
  .crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    pointer-events: none;
    z-index: 10;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
  }
  .crosshair::before {
    width: 2px; height: 100%;
    left: 50%; transform: translateX(-50%);
  }
  .crosshair::after {
    width: 100%; height: 2px;
    top: 50%; transform: translateY(-50%);
  }

  .btn-row { display: flex; gap: 10px; margin-top: 4px; margin-bottom: 20px; }
  button {
    flex: 1; padding: 12px 0; border: none;
    border-radius: 9px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.18s;
  }
  #parseBtn { background: #4f46e5; color: #fff; }
  #parseBtn:hover { background: #4338ca; }
  #cameraBtn { background: #0891b2; color: #fff; }
  #cameraBtn.active { background: #dc2626; }
  #clearBtn { background: #f0f2f5; color: #555; flex: 0.6; }
  #clearBtn:hover { background: #e2e4ea; }

  .divider { border: none; border-top: 1px solid #eee; margin: 16px 0; }

  #result { display: none; }
  .result-label {
    font-size: 12px; font-weight: 700; color: #888;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
  }
  .item { border: 2px solid #e8eaff; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .item-left { flex: 1; }
  .item-type { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 4px; }
  .imei-label { color: #4f46e5; }
  .eid-label  { color: #7c3aed; }
  .sn-label   { color: #0891b2; }
  .item-value { font-size: 15px; font-family: 'Courier New', monospace; color: #111; word-break: break-all; }
  .copy-btn {
    padding: 7px 14px; font-size: 12px; font-weight: 600;
    background: #f0f2f5; border: 1px solid #d0d5dd;
    border-radius: 7px; color: #444; cursor: pointer;
    white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
  }
  .copy-btn:hover { background: #e2e4ea; }
  .copy-btn.copied { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
  .barcode-wrap {
    background: #fff; border: 1px solid #e8eaff;
    border-radius: 8px; padding: 12px 8px 6px; text-align: center;
  }
  .barcode-wrap svg { max-width: 100%; height: auto; }
  .barcode-hint { font-size: 11px; color: #aaa; margin-top: 6px; }
  .error-box {
    background: #fff1f1; border: 1px solid #fca5a5;
    border-radius: 9px; color: #b91c1c; font-size: 13px;
    padding: 13px 16px; display: none; margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🍎 APPLE 序號查詢</h1>
  <p class="subtitle">掃描外盒 QR Code，取得 IMEI／EID／S/N 條碼或複製數值</p>

  <!-- Html5QrCode 掃描器放這裡 -->
  <div class="qr-wrap" id="qrWrap">
    <div id="qr-reader"></div>
    <div class="crosshair"></div>
  </div>

  <label for="scanInput">掃描器輸入 / 貼上 QR Code 內容</label>
  <input type="text" id="scanInput" placeholder="請用掃描器掃描外盒 QR Code…" autocomplete="off" />

  <div class="btn-row">
    <button id="cameraBtn">📷 鏡頭掃描</button>
    <button id="parseBtn">🔍 解析</button>
    <button id="clearBtn">✕ 清除</button>
  </div>

  <hr class="divider">

  <div class="error-box" id="errorBox"></div>

  <div id="result">
    <div class="result-label">請選擇掃描條碼或複製數值</div>
    <div id="infoGrid"></div>
  </div>
</div>

<script>
// ── 複製 ──────────────────────────────────────────────────────────────────────
function fallbackCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { if (document.execCommand('copy')) onSuccess(); } catch(e) {}
  document.body.removeChild(ta);
}

// ── Parse ─────────────────────────────────────────────────────────────────────
function parseQR(raw) {
  raw = raw.trim();
  const result = {};
  const clean = v => v ? v.replace(/[^0-9A-Za-z]/g, '') : v;
  try {
    const u = new URL(raw);
    const params = u.searchParams;
    const pathParts = u.pathname.split('/');
    const aiCheck = ai => {
      const idx = pathParts.indexOf(ai);
      return idx !== -1 ? pathParts[idx + 1] : null;
    };
    const imei = params.get('8040') || aiCheck('8040');
    const eid  = params.get('8042') || aiCheck('8042');
    const snIdx = pathParts.indexOf('21');
    const sn = snIdx !== -1 ? pathParts[snIdx + 1] : null;
    if (imei) result['IMEI'] = clean(imei);
    if (eid)  result['EID']  = clean(eid);
    if (sn)   result['S/N']  = clean(sn);
  } catch {
    const imeis = [...raw.matchAll(/\b(\d{15})\b/g)].map(m => m[1]);
    const eids  = [...raw.matchAll(/\b(\d{32})\b/g)].map(m => m[1]);
    if (imeis[0]) result['IMEI'] = imeis[0];
    if (eids[0])  result['EID']  = eids[0];
  }
  return Object.keys(result).length ? result : null;
}

// ── Barcode ───────────────────────────────────────────────────────────────────
function createBarcode(value) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  try {
    JsBarcode(svg, value, { format: 'CODE128', width: 2, height: 60, displayValue: false, margin: 4 });
    return svg;
  } catch(e) { return null; }
}

function labelClass(label) {
  if (label === 'EID') return 'eid-label';
  if (label === 'S/N') return 'sn-label';
  return 'imei-label';
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(fields) {
  const grid = document.getElementById('infoGrid');
  grid.innerHTML = '';
  for (const [label, value] of Object.entries(fields)) {
    const div = document.createElement('div');
    div.className = 'item';
    const header = document.createElement('div');
    header.className = 'item-header';
    header.innerHTML = `
      <div class="item-left">
        <div class="item-type ${labelClass(label)}">${label}</div>
        <div class="item-value">${value}</div>
      </div>
      <button class="copy-btn" data-val="${value}">複製</button>
    `;
    div.appendChild(header);
    const barcodeWrap = document.createElement('div');
    barcodeWrap.className = 'barcode-wrap';
    const svg = createBarcode(value);
    if (svg) {
      barcodeWrap.appendChild(svg);
      const hint = document.createElement('div');
      hint.className = 'barcode-hint';
      hint.textContent = '可用掃描器直接掃描上方條碼';
      barcodeWrap.appendChild(hint);
    } else {
      barcodeWrap.textContent = '條碼產生失敗';
    }
    div.appendChild(barcodeWrap);
    grid.appendChild(div);
  }
  grid.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.val;
      function onSuccess() {
        btn.textContent = '已複製 ✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(val).then(onSuccess).catch(() => fallbackCopy(val, onSuccess));
      } else {
        fallbackCopy(val, onSuccess);
      }
    });
  });
  document.getElementById('result').style.display = 'block';
}

function showError(msg) {
  document.getElementById('result').style.display = 'none';
  const e = document.getElementById('errorBox');
  e.textContent = msg; e.style.display = 'block';
}

function doParse(raw) {
  raw = raw || document.getElementById('scanInput').value;
  document.getElementById('errorBox').style.display = 'none';
  if (!raw.trim()) { showError('請先掃描或輸入 QR Code 內容。'); return; }
  const fields = parseQR(raw);
  if (fields) render(fields);
  else showError('⚠️ 無法解析此 QR Code，請確認格式或聯絡系統管理員。');
}

// ── Html5QrCode 鏡頭 ──────────────────────────────────────────────────────────
let html5QrCode = null;
let scanning = false;
const camBtn = document.getElementById('cameraBtn');
const qrReaderEl = document.getElementById('qrWrap');

async function startCamera() {
  qrReaderEl.style.display = 'block';
  camBtn.textContent = '⏹ 停止掃描';
  camBtn.classList.add('active');
  scanning = true;

  html5QrCode = new Html5Qrcode('qr-reader');

  try {
    // 嘗試啟用連續自動對焦
    const constraints = {
      facingMode: 'environment',
      focusMode: 'continuous',
      advanced: [{ focusMode: 'continuous' }]
    };

    await html5QrCode.start(
      constraints,
      {
        fps: 15,
        qrbox: { width: 220, height: 220 },
        aspectRatio: 1.0,
        videoConstraints: {
          facingMode: 'environment',
          focusMode: 'continuous',
          advanced: [{ focusMode: 'continuous' }]
        },
      },
      (decodedText) => {
        stopCamera();
        document.getElementById('scanInput').value = decodedText;
        doParse(decodedText);
      },
      () => {} // 忽略掃描中的錯誤訊息
    );
    // 啟動後嘗試直接對 video track 設定連續對焦
    setTimeout(() => {
      try {
        const videoEl = document.querySelector('#qr-reader video');
        if (videoEl && videoEl.srcObject) {
          const tracks = videoEl.srcObject.getVideoTracks();
          if (tracks.length > 0) {
            const track = tracks[0];
            const caps = track.getCapabilities ? track.getCapabilities() : {};
            if (caps.focusMode && caps.focusMode.includes('continuous')) {
              track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
            }
          }
        }
      } catch(e) {}
    }, 1000);

  } catch(e) {
    showError('⚠️ 無法開啟鏡頭，請確認已授權相機權限。');
    stopCamera();
  }
}

async function stopCamera() {
  if (html5QrCode && scanning) {
    try { await html5QrCode.stop(); } catch(e) {}
    html5QrCode = null;
  }
  scanning = false;
  qrReaderEl.style.display = 'none';
  camBtn.textContent = '📷 鏡頭掃描';
  camBtn.classList.remove('active');
}

camBtn.addEventListener('click', () => {
  if (scanning) stopCamera();
  else startCamera();
});

// ── 其他事件 ──────────────────────────────────────────────────────────────────
document.getElementById('parseBtn').addEventListener('click', () => doParse());
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('scanInput').value = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  stopCamera();
  document.getElementById('scanInput').focus();
});
document.getElementById('scanInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doParse();
});
let autoTimer;
document.getElementById('scanInput').addEventListener('input', () => {
  clearTimeout(autoTimer);
  if (document.getElementById('scanInput').value.length > 20)
    autoTimer = setTimeout(() => doParse(), 400);
});
</script>
</body>
</html>
